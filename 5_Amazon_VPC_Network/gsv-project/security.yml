# ALB Security Group — Internet traffic
resource "aws_security_group" "alb_sg" {
  name   = "${var.project_name}-alb-sg"
  vpc_id = aws_vpc.main.id
  ingress { from_port = 80  to_port = 80  protocol = "tcp" cidr_blocks = ["0.0.0.0/0"] }
  ingress { from_port = 443 to_port = 443 protocol = "tcp" cidr_blocks = ["0.0.0.0/0"] }
  egress  { from_port = 0   to_port = 0   protocol = "-1"  cidr_blocks = ["0.0.0.0/0"] }
  tags = { Name = "${var.project_name}-alb-sg" }
}

# EKS Security Group — Internal VPC only
resource "aws_security_group" "eks_sg" {
  name   = "${var.project_name}-eks-sg"
  vpc_id = aws_vpc.main.id
  ingress { from_port = 0 to_port = 0 protocol = "-1" cidr_blocks = ["10.0.0.0/16"] }
  egress  { from_port = 0 to_port = 0 protocol = "-1" cidr_blocks = ["0.0.0.0/0"] }
  tags = { Name = "${var.project_name}-eks-sg" }
}

# RDS Security Group — Only EKS can connect
resource "aws_security_group" "rds_sg" {
  name   = "${var.project_name}-rds-sg"
  vpc_id = aws_vpc.main.id
  ingress {
    from_port       = 5432 to_port = 5432 protocol = "tcp"
    security_groups = [aws_security_group.eks_sg.id]
  }
  egress { from_port = 0 to_port = 0 protocol = "-1" cidr_blocks = ["0.0.0.0/0"] }
  tags = { Name = "${var.project_name}-rds-sg" }
}
