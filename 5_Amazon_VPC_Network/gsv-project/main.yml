terraform {
  required_providers {
    aws    = { source = "hashicorp/aws",    version = "~> 5.0" }
    random = { source = "hashicorp/random", version = "~> 3.5" }
  }
}

provider "aws" { region = var.aws_region }

# VPC
resource "aws_vpc" "main" {
  cidr_block           = var.vpc_cidr
  enable_dns_support   = true
  enable_dns_hostnames = true
  tags = { Name = "${var.project_name}-vpc" }
}

# Internet Gateway
resource "aws_internet_gateway" "igw" {
  vpc_id = aws_vpc.main.id
  tags   = { Name = "${var.project_name}-igw" }
}

# Public Subnets
resource "aws_subnet" "public_az1" {
  vpc_id                  = aws_vpc.main.id
  cidr_block              = "10.0.1.0/24"
  availability_zone       = "${var.aws_region}a"
  map_public_ip_on_launch = true
  tags = {
    Name                     = "${var.project_name}-public-az1"
    "kubernetes.io/role/elb" = "1"
  }
}

resource "aws_subnet" "public_az2" {
  vpc_id                  = aws_vpc.main.id
  cidr_block              = "10.0.2.0/24"
  availability_zone       = "${var.aws_region}b"
  map_public_ip_on_launch = true
  tags = {
    Name                     = "${var.project_name}-public-az2"
    "kubernetes.io/role/elb" = "1"
  }
}

# Private Subnets
resource "aws_subnet" "private_az1" {
  vpc_id            = aws_vpc.main.id
  cidr_block        = "10.0.3.0/24"
  availability_zone = "${var.aws_region}a"
  tags = {
    Name                              = "${var.project_name}-private-az1"
    "kubernetes.io/role/internal-elb" = "1"
  }
}

resource "aws_subnet" "private_az2" {
  vpc_id            = aws_vpc.main.id
  cidr_block        = "10.0.4.0/24"
  availability_zone = "${var.aws_region}b"
  tags = {
    Name                              = "${var.project_name}-private-az2"
    "kubernetes.io/role/internal-elb" = "1"
  }
}

# Elastic IPs
resource "aws_eip" "nat1" { domain = "vpc" tags = { Name = "${var.project_name}-nat-eip-1" } }
resource "aws_eip" "nat2" { domain = "vpc" tags = { Name = "${var.project_name}-nat-eip-2" } }

# NAT Gateways (HA - 1 per AZ)
resource "aws_nat_gateway" "nat_az1" {
  allocation_id = aws_eip.nat1.id
  subnet_id     = aws_subnet.public_az1.id
  depends_on    = [aws_internet_gateway.igw]
  tags          = { Name = "${var.project_name}-nat-az1" }
}
resource "aws_nat_gateway" "nat_az2" {
  allocation_id = aws_eip.nat2.id
  subnet_id     = aws_subnet.public_az2.id
  depends_on    = [aws_internet_gateway.igw]
  tags          = { Name = "${var.project_name}-nat-az2" }
}

# Public Route Table
resource "aws_route_table" "public" {
  vpc_id = aws_vpc.main.id
  route { cidr_block = "0.0.0.0/0" gateway_id = aws_internet_gateway.igw.id }
  tags   = { Name = "${var.project_name}-public-rt" }
}
resource "aws_route_table_association" "public_az1" {
  subnet_id = aws_subnet.public_az1.id route_table_id = aws_route_table.public.id
}
resource "aws_route_table_association" "public_az2" {
  subnet_id = aws_subnet.public_az2.id route_table_id = aws_route_table.public.id
}

# Private Route Tables (separate per AZ for HA)
resource "aws_route_table" "private_az1" {
  vpc_id = aws_vpc.main.id
  route { cidr_block = "0.0.0.0/0" nat_gateway_id = aws_nat_gateway.nat_az1.id }
  tags   = { Name = "${var.project_name}-private-rt-az1" }
}
resource "aws_route_table_association" "private_az1" {
  subnet_id = aws_subnet.private_az1.id route_table_id = aws_route_table.private_az1.id
}
resource "aws_route_table" "private_az2" {
  vpc_id = aws_vpc.main.id
  route { cidr_block = "0.0.0.0/0" nat_gateway_id = aws_nat_gateway.nat_az2.id }
  tags   = { Name = "${var.project_name}-private-rt-az2" }
}
resource "aws_route_table_association" "private_az2" {
  subnet_id = aws_subnet.private_az2.id route_table_id = aws_route_table.private_az2.id
}
